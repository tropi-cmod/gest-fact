<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Scan & Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #1a2a3a; --gold: #d4af37; --success: #27ae60; --danger: #c0392b; --light: #f4f7f9; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .app-card { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--primary); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); }
        .scan-wrapper { padding: 20px; text-align: center; background: #fff; }
        .btn-scan { background: var(--primary); color: var(--gold); border: 2px solid var(--gold); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .input-section { padding: 20px; border-bottom: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select { border: 1px solid #d1d9e0; padding: 10px; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; }
        .data-section { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; font-size: 0.8em; color: #7f8c8d; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid #f1f1f1; font-size: 0.9em; }
        .summary { display: flex; justify-content: flex-end; gap: 20px; padding: 15px 20px; background: var(--primary); color: white; }
        .total-item b { color: var(--gold); font-size: 1.2em; }
        .actions { padding: 20px; display: flex; gap: 10px; }
        .btn-exp { flex: 1; padding: 12px; border-radius: 8px; text-align: center; border: none; font-weight: bold; cursor: pointer; color: white; }
        .excel { background: #1d6f42; } .mail { background: #34495e; }
    </style>
</head>
<body>

<div class="app-card">
    <header><h1>💎 Business Scan & Flow</h1><p>Gestion d'inventaire pro</p></header>
    <div class="scan-wrapper">
        <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="processOCR(event)">
        <button class="btn-scan" onclick="document.getElementById('file-input').click()">📸 SCANNER FACTURE</button>
        <div id="status" style="font-size: 0.8em; margin-top: 8px; color: var(--primary);"></div>
    </div>
    <div class="input-section">
        <div class="grid">
            <input type="text" id="name" placeholder="Article" style="grid-column: span 2;">
            <input type="number" id="ht" placeholder="HT" step="0.01" oninput="syncPrices('HT')">
            <select id="tva" onchange="syncPrices('HT')">
                <option value="0.20">TVA 20%</option><option value="0.10">TVA 10%</option>
                <option value="0.055">5.5%</option><option value="0">0%</option>
            </select>
            <input type="number" id="ttc" placeholder="TTC" step="0.01" oninput="syncPrices('TTC')">
        </div>
        <button class="btn-add" onclick="addToInventory()">ENREGISTRER</button>
    </div>
    <div class="data-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="yearFilter" onchange="renderTable()"></select>
            <select id="monthFilter" onchange="renderTable()">
                <option value="all">Toute l'année</option>
                <option value="0">Jan</option><option value="1">Fév</option><option value="2">Mar</option>
                <option value="3">Avr</option><option value="4">Mai</option><option value="5">Juin</option>
                <option value="6">Juil</option><option value="7">Août</option><option value="8">Sept</option>
                <option value="9">Oct</option><option value="10">Nov</option><option value="11">Déc</option>
            </select>
        </div>
        <table>
            <thead><tr><th>DATE</th><th>DESIGNATION</th><th>HT</th><th>TVA</th><th>TTC</th><th></th></tr></thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
    <div class="summary">
        <div class="total-item">HT: <b id="totalHT">0.00</b>€</div>
        <div class="total-item">TTC: <b id="totalTTC">0.00</b>€</div>
    </div>
    <div class="actions">
        <button class="btn-exp excel" onclick="exportToCSV()">📊 EXCEL (CSV)</button>
        <button class="btn-exp mail" onclick="sendToAccountant()">📧 EMAIL</button>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('biz_v3')) || [];

    function syncPrices(origin) {
        const htIn = document.getElementById('ht'), ttcIn = document.getElementById('ttc');
        const tva = parseFloat(document.getElementById('tva').value);
        if (origin === 'HT') { ttcIn.value = (parseFloat(htIn.value || 0) * (1 + tva)).toFixed(2); }
        else { htIn.value = (parseFloat(ttcIn.value || 0) / (1 + tva)).toFixed(2); }
    }

    function addToInventory() {
        const name = document.getElementById('name').value, ht = parseFloat(document.getElementById('ht').value),
              tva = document.getElementById('tva').value, ttc = parseFloat(document.getElementById('ttc').value), now = new Date();
        if (name && ht) {
            inventory.push({ id: Date.now(), name, ht, tva: (tva*100)+'%', ttc, date: now.toLocaleDateString(), year: now.getFullYear(), month: now.getMonth() });
            localStorage.setItem('biz_v3', JSON.stringify(inventory));
            updateYearList(); renderTable(); reset();
        }
    }

    function reset() { document.getElementById('name').value = ''; document.getElementById('ht').value = ''; document.getElementById('ttc').value = ''; }

    async function processOCR(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "Analyse...";
        const { data: { text } } = await Tesseract.recognize(file, 'fra');
        const match = text.match(/(?:TTC|TOTAL|NET)[:\s]+(\d+[\.,]\d{2})/i);
        if (match) { document.getElementById('ttc').value = match[1].replace(',', '.'); syncPrices('TTC'); document.getElementById('status').innerText = "Détecté !"; }
        else { document.getElementById('status').innerText = "Prix non trouvé."; }
    }

    function updateYearList() {
        const sel = document.getElementById('yearFilter'), yrs = [...new Set(inventory.map(i => i.year))];
        if (!yrs.includes(new Date().getFullYear())) yrs.push(new Date().getFullYear());
        sel.innerHTML = yrs.sort((a,b)=>b-a).map(y => `<option value="${y}">${y}</option>`).join('');
    }

    function renderTable() {
        const y = parseInt(document.getElementById('yearFilter').value), m = document.getElementById('monthFilter').value,
              body = document.getElementById('inventoryBody');
        body.innerHTML = ''; let sHT = 0, sTTC = 0;
        inventory.filter(i => i.year === y && (m === "all" || i.month === parseInt(m))).forEach(i => {
            sHT += i.ht; sTTC += i.ttc;
            body.innerHTML += `<tr><td>${i.date}</td><td>${i.name}</td><td>${i.ht.toFixed(2)}€</td><td>${i.tva}</td><td>${i.ttc.toFixed(2)}€</td><td><button onclick="del(${i.id})" style="background:none;border:none;color:red;cursor:pointer;">✕</button></td></tr>`;
        });
        document.getElementById('totalHT').innerText = sHT.toFixed(2); document.getElementById('totalTTC').innerText = sTTC.toFixed(2);
    }

    function del(id) { inventory = inventory.filter(i => i.id !== id); localStorage.setItem('biz_v3', JSON.stringify(inventory)); renderTable(); }

    function exportToCSV() {
        let csv = "\ufeffDate;Article;HT;TVA;TTC\n";
        inventory.forEach(i => csv += `${i.date};${i.name};${i.ht};${i.tva};${i.ttc}\n`);
        const b = new Blob([csv], {type:'text/csv'}); const l = document.createElement('a');
        l.href = URL.createObjectURL(b); l.download = 'export.csv'; l.click();
    }

    function sendToAccountant() {
        let t = "Récapitulatif :\n"; inventory.forEach(i => t += `${i.date} - ${i.name}: ${i.ttc}€\n`);
        window.location.href = `mailto:comptable@exemple.com?subject=Export&body=${encodeURIComponent(t)}`;
    }

    updateYearList(); renderTable();
</script>
</body>
</html>
