<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Flow Pro - Lecteur PDF & Image</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        :root { --primary: #1a2a3a; --gold: #d4af37; --light: #f4f7f9; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .app-card { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .section { padding: 20px; border-bottom: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select { border: 1px solid #d1d9e0; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; width: 100%; }
        .btn-scan { background: var(--primary); color: var(--gold); border: 2px solid var(--gold); margin-bottom: 10px; }
        .btn-add { background: var(--primary); margin-top: 15px; }
        #status { font-size: 0.85em; margin-top: 10px; color: var(--primary); font-weight: bold; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.8em; color: #7f8c8d; border-bottom: 2px solid var(--light); padding: 10px 5px; }
        td { padding: 10px 5px; border-bottom: 1px solid #f1f1f1; font-size: 0.9em; }
        .view-link { color: var(--gold); text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <header><h1>💎 Smart Scan & Flow</h1><p>Lecture Automatique PDF & Image</p></header>
    
    <div class="section">
        <button class="btn btn-scan" onclick="document.getElementById('file-selector').click()">📄 ANALYSER UN FICHIER (PDF OU IMAGE)</button>
        <input type="file" id="file-selector" accept="image/*,application/pdf" style="display:none" onchange="handleFileSelect(event)">
        <div id="status">En attente d'un document...</div>
    </div>

    <div class="section">
        <div class="grid">
            <input type="text" id="name" placeholder="Désignation" style="grid-column: span 2;">
            <input type="number" id="ht" placeholder="HT" step="0.01" oninput="syncPrices('HT')">
            <select id="tva" onchange="syncPrices('HT')">
                <option value="0.20">TVA 20%</option><option value="0.10">TVA 10%</option><option value="0.055">5.5%</option>
            </select>
            <input type="number" id="ttc" placeholder="TTC" step="0.01" oninput="syncPrices('TTC')">
        </div>
        <button class="btn btn-add" onclick="addToInventory()">📦 ENREGISTRER L'OPÉRATION</button>
    </div>

    <div class="section">
        <table>
            <thead><tr><th>DATE</th><th>NOM</th><th>TTC</th><th>DOC</th><th></th></tr></thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuration de PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let inventory = JSON.parse(localStorage.getItem('biz_v5')) || [];
    let currentFileData = null;

    function syncPrices(origin) {
        const ht = document.getElementById('ht'), ttc = document.getElementById('ttc'), tva = parseFloat(document.getElementById('tva').value);
        if (origin === 'HT') ttc.value = (parseFloat(ht.value || 0) * (1 + tva)).toFixed(2);
        else ht.value = (parseFloat(ttc.value || 0) / (1 + tva)).toFixed(2);
    }

    // Fonction principale de gestion du fichier
    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        status.innerText = "⏳ Préparation du document...";

        // Sauvegarde du fichier pour l'archivage
        const reader = new FileReader();
        reader.onload = async function(e) {
            currentFileData = e.target.result;
            
            if (file.type === "application/pdf") {
                analyzePDF(currentFileData);
            } else {
                analyzeImage(currentFileData);
            }
        };
        reader.readAsDataURL(file);
    }

    // ANALYSE DES PDF
    async function analyzePDF(pdfData) {
        const status = document.getElementById('status');
        status.innerText = "⏳ Lecture du PDF (Conversion en image)...";
        
        try {
            const loadingTask = pdfjsLib.getDocument(pdfData);
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1); // On lit la 1ère page
            const viewport = page.getViewport({ scale: 2.0 });
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            const imageData = canvas.toDataURL('image/png');
            
            analyzeImage(imageData); // On envoie l'image générée à l'OCR
        } catch (e) {
            status.innerText = "❌ Erreur lors de la lecture du PDF.";
        }
    }

    // ANALYSE OCR (IMAGE)
    async function analyzeImage(imgSource) {
        const status = document.getElementById('status');
        status.innerText = "⏳ Analyse du texte et des prix...";
        
        try {
            const { data: { text } } = await Tesseract.recognize(imgSource, 'fra');
            const amounts = text.match(/\d+[\.,]\d{2}/g);
            
            if (amounts) {
                const numbers = amounts.map(a => parseFloat(a.replace(',', '.')));
                const max = Math.max(...numbers);
                document.getElementById('ttc').value = max.toFixed(2);
                syncPrices('TTC');
                status.innerText = "✅ Prix TTC détecté : " + max.toFixed(2) + "€";
            } else {
                status.innerText = "⚠️ Texte lu, mais aucun prix trouvé.";
            }
        } catch (e) {
            status.innerText = "❌ Erreur OCR.";
        }
    }

    function addToInventory() {
        const name = document.getElementById('name').value, ttc = parseFloat(document.getElementById('ttc').value);
        if (name && ttc) {
            inventory.push({
                id: Date.now(), name, ttc, ht: parseFloat(document.getElementById('ht').value),
                date: new Date().toLocaleDateString(), file: currentFileData,
                year: new Date().getFullYear(), month: new Date().getMonth()
            });
            localStorage.setItem('biz_v5', JSON.stringify(inventory));
            currentFileData = null; renderTable();
            document.getElementById('name').value = ''; document.getElementById('ttc').value = '';
        } else { alert("Données manquantes"); }
    }

    function renderTable() {
        const body = document.getElementById('inventoryBody');
        body.innerHTML = '';
        inventory.forEach(i => {
            const docBtn = i.file ? `<span class="view-link" onclick="viewDoc('${i.id}')">👁️</span>` : '-';
            body.innerHTML += `<tr><td>${i.date}</td><td>${i.name}</td><td>${i.ttc.toFixed(2)}€</td><td>${docBtn}</td><td><button onclick="del(${i.id})" style="background:none; border:none; color:red; cursor:pointer;">✕</button></td></tr>`;
        });
    }

    function viewDoc(id) {
        const item = inventory.find(i => i.id == id);
        const win = window.open();
        win.document.write(`<iframe src="${item.file}" frameborder="0" style="width:100%; height:100%;"></iframe>`);
    }

    function del(id) {
        inventory = inventory.filter(i => i.id != id);
        localStorage.setItem('biz_v5', JSON.stringify(inventory));
        renderTable();
    }

    renderTable();
</script>
</body>
</html>
