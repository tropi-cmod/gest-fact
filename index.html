<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Flow - Gestion Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --sidebar-w: 240px; --primary: #1e293b; --accent: #3b82f6; --gold: #f59e0b; --bg: #f1f5f9; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; color: #1e293b; }
        
        /* Navigation */
        nav { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 10; }
        .logo { padding: 25px; font-weight: 800; font-size: 1.2em; color: var(--gold); border-bottom: 1px solid #334155; }
        nav a { padding: 15px 25px; color: #cbd5e1; text-decoration: none; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; }
        nav a:hover, nav a.active { background: #334155; color: white; border-left-color: var(--gold); }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { background: white; padding: 15px 40px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
        .container { padding: 25px; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat-card small { color: #64748b; font-size: 0.8em; font-weight: 600; text-transform: uppercase; }
        .stat-card div { font-size: 1.5em; font-weight: 800; margin-top: 5px; }

        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9em; }
        .btn-main { background: var(--accent); color: white; width: 100%; padding: 15px; font-size: 1em; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.75em; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9em; }
        
        .btn-edit { color: var(--accent); background: none; border: none; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .status-msg { margin-top: 15px; font-weight: 700; color: var(--accent); text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo">HECTOR FLOW</div>
    <a onclick="show('scan')" id="nav-scan" class="active">📸 SCANNER</a>
    <a onclick="show('list')" id="nav-list">📋 INVENTAIRE</a>
    <div style="margin-top: auto; padding: 20px; gap: 10px; display: flex; flex-direction: column;">
        <button class="btn" style="background:var(--success); color:white;" onclick="exportExcel()">📊 EXCEL PRO</button>
        <button class="btn" style="background:#475569; color:white;" onclick="sendMail()">📧 ENVOYER RAPPORT</button>
        <button class="btn" style="background:transparent; color:#94a3b8; font-size:0.7em;" onclick="clearAll()">VIDER LA BASE</button>
    </div>
</nav>

<main>
    <header>
        <h2 id="title">Scanner de Stock</h2>
        <div id="clock"></div>
    </header>

    <div class="container">
        <div id="stats-area" class="stats-grid hidden">
            <div class="stat-card"><small>Total HT</small><div id="stat-ht">0,00 €</div></div>
            <div class="stat-card"><small>Total TTC</small><div id="stat-ttc" style="color:var(--gold)">0,00 €</div></div>
        </div>

        <div id="view-scan">
            <div class="card" style="text-align:center; border: 2px dashed var(--accent);">
                <button class="btn btn-main" onclick="document.getElementById('input-f').click()">📥 ANALYSER UN DOCUMENT</button>
                <input type="file" id="input-f" hidden onchange="handleFile(event)">
                <div id="status" class="status-msg">En attente...</div>
            </div>
            <div class="card">
                <h3>Dernières entrées</h3>
                <table>
                    <thead><tr><th>Produit</th><th>HT</th><th>TTC</th></tr></thead>
                    <tbody id="recent-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-list" class="hidden">
            <div class="card">
                <table id="main-table">
                    <thead><tr><th>Date</th><th>Produit</th><th>HT</th><th>TVA</th><th>TTC</th><th>Actions</th></tr></thead>
                    <tbody id="all-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let inventory = JSON.parse(localStorage.getItem('hector_final_v3')) || [];

    function show(v) {
        document.getElementById('view-scan').className = v === 'scan' ? '' : 'hidden';
        document.getElementById('view-list').className = v === 'list' ? '' : 'hidden';
        document.getElementById('stats-area').className = v === 'list' ? 'stats-grid' : 'hidden';
        document.getElementById('nav-scan').className = v === 'scan' ? 'active' : '';
        document.getElementById('nav-list').className = v === 'list' ? 'active' : '';
        document.getElementById('title').innerText = v === 'scan' ? 'Scanner de Stock' : 'Inventaire Complet';
        if(v === 'list') renderAll();
    }

    async function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('status').innerText = "⏳ Lecture IA en cours...";
        const reader = new FileReader();
        reader.onload = async function(res) {
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument(res.target.result).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                process(canvas.toDataURL());
            } else { process(res.target.result); }
        };
        reader.readAsArrayBuffer(file);
    }

    async function process(src) {
        try {
            const { data: { lines } } = await Tesseract.recognize(src, 'fra');
            lines.forEach(l => {
                const t = l.text.trim();
                const m = t.match(/(.+?)(\d+[\.,]\d{2})/);
                if(m && t.length > 5 && !t.toUpperCase().includes('TOTAL')) {
                    const ht = parseFloat(m[2].replace(',', '.'));
                    addToList(m[1].trim(), ht, 0.20); // 20% par défaut
                }
            });
            document.getElementById('status').innerText = "✅ Scan terminé ! Vérifiez et modifiez si besoin.";
            renderRecent();
        } catch(err) { document.getElementById('status').innerText = "❌ Erreur de lecture."; }
    }

    function addToList(name, ht, rate) {
        inventory.unshift({
            id: Date.now()+Math.random(), name: name,
            ht: ht, tvaRate: rate, ttc: ht * (1 + rate),
            date: new Date().toLocaleDateString('fr-FR')
        });
        save();
    }

    function editItem(id) {
        const item = inventory.find(i => i.id === id);
        const newName = prompt("Nom du produit :", item.name);
        const newHT = prompt("Prix HT (utiliser le point ex: 10.50) :", item.ht);
        const newTVA = prompt("Taux TVA (ex: 0.20 pour 20%, 0.10 pour 10%, 0.055 pour 5.5%) :", item.tvaRate);
        
        if (newName && newHT && newTVA) {
            item.name = newName;
            item.ht = parseFloat(newHT);
            item.tvaRate = parseFloat(newTVA);
            item.ttc = item.ht * (1 + item.tvaRate);
            save(); renderAll(); renderRecent();
        }
    }

    function renderAll() {
        let sHT = 0, sTTC = 0;
        document.getElementById('all-body').innerHTML = inventory.map(i => {
            sHT += i.ht; sTTC += i.ttc;
            return `<tr>
                <td>${i.date}</td>
                <td><b>${i.name}</b></td>
                <td>${i.ht.toFixed(2)}€</td>
                <td>${(i.tvaRate*100).toFixed(1)}%</td>
                <td><b>${i.ttc.toFixed(2)}€</b></td>
                <td>
                    <button class="btn-edit" onclick="editItem(${i.id})">Modifier</button>
                    <button onclick="del(${i.id})" style="color:red;border:none;background:none;cursor:pointer;">✕</button>
                </td>
            </tr>`;
        }).join('');
        document.getElementById('stat-ht').innerText = sHT.toFixed(2) + " €";
        document.getElementById('stat-ttc').innerText = sTTC.toFixed(2) + " €";
    }

    function renderRecent() {
        document.getElementById('recent-body').innerHTML = inventory.slice(0, 5).map(i => `
            <tr><td>${i.name}</td><td>${i.ht.toFixed(2)}€</td><td><b>${i.ttc.toFixed(2)}€</b></td></tr>
        `).join('');
    }

    function save() { localStorage.setItem('hector_final_v3', JSON.stringify(inventory)); }
    function del(id) { inventory = inventory.filter(i => i.id !== id); save(); renderAll(); renderRecent(); }
    function clearAll() { if(confirm("Vider tout ?")) { inventory = []; save(); renderAll(); renderRecent(); } }

    function exportExcel() {
        let csv = "\ufeffDate;Produit;HT;TVA;TTC\n";
        inventory.forEach(i => csv += `${i.date};${i.name};${i.ht.toFixed(2).replace('.',',')};${(i.tvaRate*100)}%;${i.ttc.toFixed(2).replace('.',',')}\n`);
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Hector_Export.csv'; a.click();
    }

    function sendMail() {
        let body = "RAPPORT D'INVENTAIRE - HECTOR FLOW\n";
        body += "-------------------------------------------\n";
        body += "DATE | PRODUIT | HT | TTC\n";
        inventory.forEach(i => {
            body += `${i.date} | ${i.name.padEnd(20)} | ${i.ht.toFixed(2)}€ | ${i.ttc.toFixed(2)}€\n`;
        });
        body += "-------------------------------------------\n";
        body += `TOTAL TTC : ${document.getElementById('stat-ttc').innerText}`;
        window.location.href = `mailto:?subject=Inventaire Hector&body=${encodeURIComponent(body)}`;
    }

    document.getElementById('clock').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    renderRecent();
</script>
</body>
</html>
