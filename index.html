<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire Stock & TVA IA</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --primary: #1a2a3a; --gold: #d4af37; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-card { max-width: 1100px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .action-zone { padding: 20px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .btn-scan { background: var(--primary); color: var(--gold); border: 2px solid var(--gold); width: 100%; max-width: 400px; }
        .inventory-list { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; font-size: 0.8em; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .tva-badge { background: #eef2f3; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #555; }
        .price-ttc { font-weight: bold; color: var(--primary); }
        #status { font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <header>
        <h1>📦 Inventaire & Détail TVA</h1>
        <p>Extraction automatique Produit / HT / TVA / TTC</p>
    </header>

    <div class="action-zone">
        <button class="btn btn-scan" onclick="document.getElementById('file-selector').click()">📸 SCANNER FACTURE DÉTAILLÉE (PDF/IMG)</button>
        <input type="file" id="file-selector" accept="image/*,application/pdf" style="display:none" onchange="handleFile(event)">
        <div id="status">Prêt pour l'analyse</div>
    </div>

    <div class="inventory-list">
        <table>
            <thead>
                <tr>
                    <th>PRODUIT</th>
                    <th>PRIX HT</th>
                    <th>TAUX TVA</th>
                    <th>MONTANT TVA</th>
                    <th>TOTAL TTC</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>

    <div style="padding: 20px; background: #1a2a3a; color: white; display: flex; justify-content: space-between; align-items: center;">
        <div>Articles : <b id="totalCount">0</b></div>
        <div>Total HT : <b id="totalHT">0.00</b> € | Total TTC : <b id="totalTTC" style="color:var(--gold)">0.00</b> €</div>
        <button onclick="exportExcel()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">📊 Export Excel</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let stock = JSON.parse(localStorage.getItem('biz_inventory_tva')) || [];

    async function handleFile(event) {
        const file = event.target.files[0]; if (!file) return;
        document.getElementById('status').innerText = "⏳ Lecture du document...";
        const reader = new FileReader();
        reader.onload = async function(e) {
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument(e.target.result).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                processText(canvas.toDataURL());
            } else { processText(e.target.result); }
        };
        reader.readAsDataURL(file);
    }

    async function processText(source) {
        const status = document.getElementById('status');
        status.innerText = "🔍 Analyse des lignes et de la TVA...";
        try {
            const { data: { lines } } = await Tesseract.recognize(source, 'fra');
            let added = 0;

            lines.forEach(line => {
                const text = line.text.trim();
                // Regex améliorée : Cherche Nom + Prix + optionnellement un taux de TVA
                const match = text.match(/(.+?)(\d+[\.,]\d{2})\s*([0-9,]+%|A|B|C)?/i);
                
                if (match && text.length > 5 && !text.toUpperCase().includes('TOTAL')) {
                    const name = match[1].trim();
                    const ht = parseFloat(match[2].replace(',', '.'));
                    
                    // Détection intelligente du taux de TVA
                    let tvaRate = 0.20; // Par défaut 20%
                    if (text.includes('5,5') || text.includes('5.5')) tvaRate = 0.055;
                    else if (text.includes('10%') || text.includes(' 10')) tvaRate = 0.10;

                    const tvaAmount = ht * tvaRate;
                    const ttc = ht + tvaAmount;

                    stock.unshift({
                        id: Date.now() + Math.random(),
                        name: name,
                        ht: ht,
                        rate: (tvaRate * 100).toFixed(1) + "%",
                        tvaValue: tvaAmount,
                        ttc: ttc,
                        date: new Date().toLocaleDateString()
                    });
                    added++;
                }
            });

            localStorage.setItem('biz_inventory_tva', JSON.stringify(stock));
            renderStock();
            status.innerText = `✅ ${added} produits ajoutés avec TVA.`;
        } catch (e) { status.innerText = "❌ Erreur d'analyse."; }
    }

    function renderStock() {
        const body = document.getElementById('stockBody');
        body.innerHTML = '';
        let totalHT = 0, totalTTC = 0;
        stock.forEach(item => {
            totalHT += item.ht; totalTTC += item.ttc;
            body.innerHTML += `
                <tr>
                    <td><b>${item.name}</b></td>
                    <td>${item.ht.toFixed(2)} €</td>
                    <td><span class="tva-badge">${item.rate}</span></td>
                    <td>${item.tvaValue.toFixed(2)} €</td>
                    <td class="price-ttc">${item.ttc.toFixed(2)} €</td>
                    <td><button onclick="del('${item.id}')" style="color:red; background:none; border:none; cursor:pointer;">✕</button></td>
                </tr>`;
        });
        document.getElementById('totalCount').innerText = stock.length;
        document.getElementById('totalHT').innerText = totalHT.toFixed(2);
        document.getElementById('totalTTC').innerText = totalTTC.toFixed(2);
    }

    function del(id) {
        stock = stock.filter(i => i.id != id);
        localStorage.setItem('biz_inventory_tva', JSON.stringify(stock));
        renderStock();
    }

    function exportExcel() {
        let csv = "\ufeffProduit;HT;Taux TVA;Montant TVA;TTC;Date\n";
        stock.forEach(i => csv += `${i.name};${i.ht};${i.rate};${i.tvaValue};${i.ttc};${i.date}\n`);
        const b = new Blob([csv], {type:'text/csv'});
        const l = document.createElement('a');
        l.href = URL.createObjectURL(b); l.download = 'inventaire_tva.csv'; l.click();
    }
    renderStock();
</script>
</body>
</html>
